# MineStaff Configuration
messages:
  # General messages
  only_players: "Only players can use this command."
  no_permission: "You do not have permission to use this command."
  staffmode_enabled: "&aStaff Mode enabled."
  staffmode_disabled: "&cStaff Mode disabled."
  no_password_set: "You must set a staff login password first using /stafflogin set <password>"
  must_login: "You must log in first using /stafflogin <password> before toggling Staff Mode."
  password_required: "Please provide a password."
  password_set: "Staff login password set successfully."
  already_logged_in: "You are already logged in."
  login_success: "Staff login successful! You can now use staff mode."
  login_failed: "Incorrect password."
  teleport_failed: "No players to teleport to."
  freeze_notify: "&eYou have been frozen by a staff member."
  unfreeze_notify: "&aYou have been unfrozen."
  vanish_invisible: "You are now invisible."
  vanish_visible: "You are now visible."

  # Action logger messages
  inspect: "&6%staff% &finspected &7%target%"
  freeze: "&6%staff% &f%action% &7%target%"
  teleport: "&6%staff% &fteleported to &7%target%"
  vanish: "&6%staff% &f%action%"
  command_log: "&6%staff% &fexecuted command: &7%command%"
  block_break: "&c%player% &fbroke a &7%block% &fat &7%x%, %y%, %z%"
  block_place: "&a%player% &fplaced a &7%block% &fat &7%x%, %y%, %z%"
  item_drop: "&d%player% &fdropped &7%amount%x &7%item% &fat &7%x%, %y%, %z%"

  # Staff chat
  staffchat_enabled: "Staff chat enabled."
  staffchat_disabled: "Staff chat disabled."
  staffchat_usage: "Usage: /staffchat <message>"
  staffchat_format: "&8[&bStaff&8] &7%player%: %message%"

  # Alert prefixes
  alert_prefix: "&c[MineStaff Alert] &f"
  name_skin_change: "&e%player%'s skin or name has changed!"
  vulcan_violation: "&4Vulcan Alert: &c%player% failed &f%check% &c(VL: %vl%)"
  vulcan_punishment: "&c%player% was punished by Vulcan for &f%check%"
  godseye_detected: "&4GodEyes Alert: &c%player% flagged for &f%cheat%&c."

# Staff tool configurations
tool-slots:
  inspect: 0
  teleport: 1
  freeze: 7
  vanish: 8

tool-materials:
  inspect: "CHEST"
  teleport: "COMPASS"
  freeze: "ICE"
  vanish: "INVISIBILITY_POTION"

tool-names:
  inspect: "Inspect Player"
  teleport: "Random Teleport"
  freeze: "Freeze Player"
  vanish: "Toggle Vanish"

tool-cooldowns:
  inspect: 20 # 1 second (20 ticks)
  teleport: 40 # 2 seconds
  freeze: 20 # 1 second
  vanish: 20 # 1 second

# Staff mode settings
staff-mode:
  hide-inventory: true
  hide-block-interactions: true
  toggle-cooldown: 200 # 10 seconds (200 ticks)

# Staff chat settings
staff-chat:
  enabled: true
  toggle-only: true
  format: "&8[&bStaff&8] &7%player%: %message%"

# Alert settings
alerts:
  block_break: true
  block_place: true
  item_drop: true
  vulcan_violation: true
  vulcan_punishment: true
  godseye_events: true
  skin_or_name_change: true
  name_skin_change: true

# Alert colors
alert-colors:
  block_break: "&c"
  block_place: "&a"
  item_drop: "&d"
  vulcan_violation: "&4"
  vulcan_punishment: "&c"
  godseye_events: "&4"
  name_skin_change: "&e"

# Integrations
integrations:
  vulcan:
    enabled: true
  godseye:
    enabled: true

# Debug settings
debug:
  enabled: false
