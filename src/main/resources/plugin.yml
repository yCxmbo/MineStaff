name: MineStaff
main: me.ycxmbo.mineStaff.MineStaff
version: 1.2
api-version: '1.20'
author: 'ycxmbo'
provides: [ "MineStaffAPI" ]
softdepend: [LiteBans, Vulcan, Essentials, PlaceholderAPI]
description: A streamlined Staff Mode plugin for Paper, Purpur, and Spigot 1.20.x-1.21.x
libraries:
  - net.kyori:adventure-text-minimessage:4.17.0
  - com.zaxxer:HikariCP:5.1.0
  - org.xerial:sqlite-jdbc:3.45.2.0
  - com.mysql:mysql-connector-j:8.4.0
  - redis.clients:jedis:5.1.2
  - org.apache.commons:commons-pool2:2.12.0
  - at.favre.lib:bcrypt:0.10.2

commands:
  staffmode:
    description: Toggle Staff Mode
    usage: /<command>
    aliases: [sm, staff]
    permission: staffmode.toggle
  stafflogin:
    description: Staff must log in before moving or using commands
    usage: /<command> <password>
    aliases: [slogin, stafflog, slog]
  staffchat:
    description: Send a message to staff chat
    aliases: [sc, schat]
  report:
    description: Report a player
    aliases: [rp, reportplayer]
  infractions:
    description: Manage/view infractions
    aliases: [inf, infraction, warns]
  rollback:
    description: Open rollback GUI
    aliases: [rb, invrollback]
  cpscheck:
    description: Check clicks-per-second over 10s
    aliases: [cps]
  stafflistgui:
    description: Open staff list GUI
    aliases: [slg, staffgui]
    permission: staffmode.stafflist.gui
  stafflist:
    description: Show staff list in chat
    usage: /<command>
    aliases: [sl, slist]
    permission: staffmode.stafflist.text
  staffreload:
    description: Reload MineStaff configuration
    usage: /<command>
    aliases: [sr, sreload, minestafreload]
    permission: staffmode.reload
  freeze:
    description: Freeze or unfreeze a player (optionally for seconds)
    usage: /<command> <player> [seconds]
    aliases: [f, ice]
    permission: staffmode.freeze
  inspect:
    description: Open inspector GUI for a player
    usage: /<command> <player>
    aliases: [insp, view]
    permission: staffmode.inspect
  reports:
    description: Open reports GUI
    usage: /<command>
    aliases: [reportsgui, reportlist]
    permission: staffmode.alerts
  staffduty:
    description: Toggle staff duty on/off (enables Staff Mode)
    aliases: [duty, sduty]
    permission: staffmode.duty
  notes:
    description: Manage player notes
    usage: /<command> <player> add <note> | list | remove <index>
    aliases: [note, playernotes]
    permission: staffmode.notes
  profile:
    description: Open player profile GUI
    usage: /<command> <player>
    aliases: [p, playerprofile, pprofile]
    permission: staffmode.inspect
  inspectoffline:
    description: Inspect offline player's inventory/ender chest
    usage: /<command> <player> [ec]
    aliases: [io, offlineinspect, invo]
    permission: staffmode.inspect
  commandspy:
    description: Toggle command spy
    aliases: [cmdspy, cs]
    permission: staffmode.spy
  socialspy:
    description: Toggle social spy for private messages
    aliases: [ss, sspy]
    permission: staffmode.spy
  staff2fa:
    description: Manage staff 2FA (TOTP)
    usage: /<command> enable|confirm <otp>|disable|status
    aliases: [s2fa, 2fa]
    permission: staffmode.login
  evidence:
    description: Attach/list evidence to reports
    usage: /<command> <reportId> add <url>|list
    aliases: [ev, proof]
    permission: staffmode.alerts
  backup:
    description: Request immediate backup from other staff members
    usage: /<command> [reason]
    aliases: [requestbackup, callbackup]
    permission: staffmode.backup
  staffhelp:
    description: Show categorized help for all staff commands
    usage: /<command> [category]
    aliases: [shelp, staffh, sh]
  follow:
    description: Continuously follow a player (teleport to them)
    usage: /<command> <player>
    permission: staffmode.follow
  warn:
    description: Issue and manage player warnings
    usage: /<command> <player> <reason> [severity] [duration] | list/remove/clear/gui
    aliases: [warning, warnings]
    permission: staffmode.warn
  reporthistory:
    description: View report history for a player
    usage: /<command> <player> [filed|against|all|gui]
    aliases: [rhistory, rh, reportlog]
    permission: staffmode.reports.history
  backupdata:
    description: Manage plugin data backups
    usage: /<command> [create|list|restore|auto]
    aliases: [databackup, staffbackup]
    permission: staffmode.backup.manage
  channel:
    description: Use private staff channels for communication
    usage: /<command> [list|join|toggle|info] [channel]
    aliases: [ch, staffchannel, schannel]
    permission: staffmode.channel
  migrate:
    description: Migrate data between YAML and SQL storage
    usage: /<command> <yaml-to-sql|sql-to-yaml>
    aliases: [datamigrate, migratedata]
    permission: staffmode.admin
  ticket:
    description: Manage staff support tickets
    usage: /<command> [create|list|view|claim|comment|resolve|close|stats|gui]
    aliases: [staffticket, tickets]
    permission: staffmode.tickets
  co:
    description: CoreProtect block logging integration
    usage: /<command> <block|player|nearby|rollback|restore> [args]
    aliases: [coreprotect, lookup, blocklog]
    permission: staffmode.coreprotect
  csteleport:
    description: Teleport to a player across the network
    usage: /<command> <player>
    aliases: [cstp, networkteleport, ntp]
    permission: staffmode.teleport.crossserver
  globalstafflist:
    description: View all staff across the network
    usage: /<command>
    aliases: [gsl, networkstaff, nstaff]
    permission: staffmode.stafflist.global
  punish:
    description: Open the punishment GUI or issue punishments directly
    usage: /<command> <player> [ban|mute|kick|unban|unmute|check] [args]
    aliases: [punishment, pun]
    permission: staffmode.punish
  alts:
    description: List a player's known alternate accounts
    usage: /<command> <player>
    aliases: [alt, altcheck]
    permission: staffmode.alts
  staffstats:
    description: View staff activity analytics
    usage: /<command> [player|gui]
    aliases: [sstats, staffanalytics]
    permission: staffmode.stats
  cooldowns:
    description: Configure per-tool cooldowns via GUI
    usage: /<command>
    aliases: [toolcooldowns, cooldownconfig]
    permission: staffmode.cooldowns

permissions:
  # ── Wildcard ─────────────────────────────────────────────────────────────
  staffmode.*:
    description: Grants every MineStaff permission (server administrators)
    default: false
    children:
      staffmode.toggle: true
      staffmode.use: true
      staffmode.duty: true
      staffmode.login: true
      staffmode.reload: true
      staffmode.admin: true
      staffmode.teleport: true
      staffmode.freeze: true
      staffmode.inspect: true
      staffmode.vanish: true
      staffmode.see: true
      staffmode.cpscheck: true
      staffmode.randomtp: true
      staffmode.silentchest: true
      staffmode.follow: true
      staffmode.chat: true
      staffmode.spy: true
      staffmode.alerts: true
      staffmode.punish: true
      staffmode.punish.manage: true
      staffmode.warn: true
      staffmode.infractions: true
      staffmode.rollback: true
      staffmode.notes: true
      staffmode.backup: true
      staffmode.backup.receive: true
      staffmode.backup.manage: true
      staffmode.channel: true
      staffmode.channel.admin: true
      staffmode.channel.mod: true
      staffmode.channel.staff: true
      staffmode.tickets: true
      staffmode.tickets.notify: true
      staffmode.coreprotect: true
      staffmode.coreprotect.rollback: true
      staffmode.stafflist: true
      staffmode.stafflist.global: true
      staffmode.alts: true
      staffmode.stats: true
      staffmode.cooldowns: true
      staffmode.automod.bypass: true
      staffmode.profile: true

  # ── Core ─────────────────────────────────────────────────────────────────
  staffmode.toggle:
    description: Toggle Staff Mode on/off
    default: op

  staffmode.use:
    description: Recognized as a staff member; included in the global staff list
    default: op

  staffmode.duty:
    description: Toggle staff duty (also activates Staff Mode)
    default: op

  staffmode.login:
    description: Use /stafflogin and /staff2fa
    default: op

  staffmode.reload:
    description: Reload the MineStaff configuration
    default: op

  staffmode.admin:
    description: Access administrative commands (data migration, etc.)
    default: op

  # ── Teleport ─────────────────────────────────────────────────────────────
  staffmode.teleport:
    description: Use the teleport staff tool to teleport to players
    default: op
    children:
      staffmode.teleport.crossserver: true

  staffmode.teleport.crossserver:
    description: Teleport to players on other servers in the network
    default: op

  # ── Freeze ───────────────────────────────────────────────────────────────
  staffmode.freeze:
    description: Freeze and unfreeze players
    default: op
    children:
      staffmode.freeze.use: true

  staffmode.freeze.use:
    description: Use the freeze tool from the staff tool belt (alias for staffmode.freeze)
    default: op

  staffmode.freeze.bypass:
    description: Cannot be frozen by staff
    default: false

  # ── Inspect / Profile ────────────────────────────────────────────────────
  staffmode.inspect:
    description: Open the inspector GUI and offline inventory viewer
    default: op
    children:
      staffmode.profile: true

  staffmode.profile:
    description: Open the player profile GUI
    default: op

  # ── Vanish ───────────────────────────────────────────────────────────────
  staffmode.vanish:
    description: Toggle vanish
    default: op

  staffmode.see:
    description: See vanished staff members
    default: op

  # ── Staff tools ───────────────────────────────────────────────────────────
  staffmode.cpscheck:
    description: Run a CPS (clicks-per-second) check on a player
    default: op

  staffmode.randomtp:
    description: Use the random teleport tool in Staff Mode
    default: op

  staffmode.silentchest:
    description: Open containers silently while in Staff Mode
    default: op

  staffmode.follow:
    description: Continuously follow another player (teleport to them)
    default: op

  staffmode.follow.bypass:
    description: Cannot be followed by staff members
    default: false

  # ── Communication ─────────────────────────────────────────────────────────
  staffmode.chat:
    description: Send and receive staff chat messages
    default: op

  staffmode.spy:
    description: Use CommandSpy and SocialSpy
    default: op

  # ── Reports ───────────────────────────────────────────────────────────────
  staffmode.report:
    description: File a player report with /report
    default: true

  staffmode.alerts:
    description: Receive staff alerts; access the reports GUI and evidence system
    default: op
    children:
      staffmode.reports.history: true
      staffmode.reports.notify: true

  staffmode.reports.history:
    description: View a player's full report history
    default: op

  staffmode.reports.notify:
    description: Receive cross-server report notifications via network sync
    default: op

  # ── Punishments ───────────────────────────────────────────────────────────
  staffmode.punish:
    description: Issue punishments (ban / mute / kick) via the punishment GUI or commands
    default: op
    children:
      staffmode.punish.manage: true

  staffmode.punish.manage:
    description: Remove punishments (unban / unmute)
    default: op

  # ── Warnings ──────────────────────────────────────────────────────────────
  staffmode.warn:
    description: Issue and manage player warnings
    default: op

  # ── Infractions ───────────────────────────────────────────────────────────
  staffmode.infractions:
    description: View player infractions
    default: op
    children:
      staffmode.infractions.add: true

  staffmode.infractions.add:
    description: Add infractions to a player's record
    default: op

  # ── Rollback / Snapshots ─────────────────────────────────────────────────
  staffmode.rollback:
    description: Use the inventory rollback GUI to restore player inventories
    default: op

  staffmode.rollback.snapshot.bypass:
    description: Exclude this player from periodic inventory snapshots
    default: false

  # ── Notes ─────────────────────────────────────────────────────────────────
  staffmode.notes:
    description: Add, list, and remove notes on players
    default: op

  # ── Backup ────────────────────────────────────────────────────────────────
  staffmode.backup:
    description: Request immediate backup from other staff members via /backup
    default: op
    children:
      staffmode.backup.receive: true
      staffmode.backup.manage: true

  staffmode.backup.receive:
    description: Receive backup requests broadcast by other staff
    default: op

  staffmode.backup.manage:
    description: Create, list, and restore plugin data backups with /backupdata
    default: op

  # ── Staff Channels ────────────────────────────────────────────────────────
  staffmode.channel:
    description: Use private staff channels with /channel
    default: op
    children:
      staffmode.channel.admin: true
      staffmode.channel.mod: true
      staffmode.channel.staff: true

  staffmode.channel.admin:
    description: Access the admin staff channel
    default: op

  staffmode.channel.mod:
    description: Access the moderator staff channel
    default: op

  staffmode.channel.staff:
    description: Access the general staff channel
    default: op

  # ── Tickets ───────────────────────────────────────────────────────────────
  staffmode.tickets:
    description: Use the staff ticket system (/ticket)
    default: op
    children:
      staffmode.tickets.notify: true

  staffmode.tickets.notify:
    description: Receive notifications for new and updated staff tickets
    default: op

  # ── CoreProtect ───────────────────────────────────────────────────────────
  staffmode.coreprotect:
    description: Use CoreProtect block-history lookups via /co
    default: op
    children:
      staffmode.coreprotect.rollback: true

  staffmode.coreprotect.rollback:
    description: Perform CoreProtect rollbacks and restores
    default: op

  # ── Staff List ────────────────────────────────────────────────────────────
  staffmode.stafflist:
    description: Access any staff list command
    default: op
    children:
      staffmode.stafflist.gui: true
      staffmode.stafflist.text: true
      staffmode.stafflist.global: true

  staffmode.stafflist.gui:
    description: Open the staff list GUI
    default: op

  staffmode.stafflist.text:
    description: View the staff list in chat
    default: op

  staffmode.stafflist.global:
    description: View the network-wide staff list
    default: op

  # ── Alts / Analytics / Config ─────────────────────────────────────────────
  staffmode.alts:
    description: View a player's known alternate accounts and receive alt-join alerts
    default: op

  staffmode.stats:
    description: View staff activity analytics and the leaderboard
    default: op

  staffmode.cooldowns:
    description: Configure per-tool cooldowns via the GUI
    default: op

  staffmode.automod.bypass:
    description: Bypass automatic chat moderation filters
    default: op
